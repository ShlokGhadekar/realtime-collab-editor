# Server
server.port=${PORT:8080}

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/collabeditor}
spring.datasource.username=${DATABASE_USERNAME:collabuser}
spring.datasource.password=${DATABASE_PASSWORD:collabpass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
app.jwt.secret=${JWT_SECRET:3cfa76ef14937c1c0ea519f8fc057a80fcd04a7aa081468516903c37e1ac7d4e}
app.jwt.expiration=86400000

# JDoodle
jdoodle.client-id=${JDOODLE_CLIENT_ID:your_client_id}
jdoodle.client-secret=${JDOODLE_CLIENT_SECRET:your_client_secret}